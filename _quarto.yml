project:
  type: website
  output-dir: docs
  render:
    - index.qmd
  resources:
    - site-assets/

website:
  title: "Visual Data Lab"
  description: "Interactive experiments in data, statistics, and machine learning."
  site-url: "https://jbkunst.github.io/visual-data-lab/"
  search: false
  navbar:
    pinned: true
    left:
      - href: index.qmd
        text: Gallery
    right:
      - icon: github
        href: "https://github.com/jbkunst/visual-data-lab"
        aria-label: "GitHub repository"

format:
  html:
    theme: cosmo
    toc: false
    anchor-sections: false
    smooth-scroll: true
    link-external-newwindow: true

execute:
  freeze: auto
